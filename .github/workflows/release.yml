---
name: Release

"on":
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # v2.9.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/cchb" dist/cchb
          cd dist
          tar czf "cchb-${TARGET}.tar.gz" cchb
          rm cchb
      - name: Upload artifact
        # v7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: cchb-${{ matrix.target }}
          path: dist/cchb-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum cchb-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt
      - name: Create release
        # v2.6.1
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            artifacts/cchb-*.tar.gz
            artifacts/checksums-sha256.txt
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      # v6.0.2 (cchb itself, for scripts/bump-tap-formula.sh)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute version and SHAs
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION="${REF_NAME#v}"
          cd artifacts
          ARM=$(awk \
            '/cchb-aarch64-apple-darwin\.tar\.gz/{print $1}' \
            checksums-sha256.txt)
          IMAC=$(awk \
            '/cchb-x86_64-apple-darwin\.tar\.gz/{print $1}' \
            checksums-sha256.txt)
          ILIN=$(awk \
            '/cchb-x86_64-unknown-linux-gnu\.tar\.gz/{print $1}' \
            checksums-sha256.txt)
          {
            echo "version=${VERSION}"
            echo "sha_arm_mac=${ARM}"
            echo "sha_intel_mac=${IMAC}"
            echo "sha_intel_linux=${ILIN}"
          } >> "$GITHUB_OUTPUT"
      # v6.0.2 (homebrew-tap)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: iselegant/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Bump and push formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_ARM_MAC: ${{ steps.meta.outputs.sha_arm_mac }}
          SHA_INTEL_MAC: ${{ steps.meta.outputs.sha_intel_mac }}
          SHA_INTEL_LINUX: ${{ steps.meta.outputs.sha_intel_linux }}
          BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -eu
          ../scripts/bump-tap-formula.sh Formula/cchb.rb
          git --no-pager diff Formula/cchb.rb
          if git diff --quiet Formula/cchb.rb; then
            echo "No changes; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "${BOT_EMAIL}"
          git add Formula/cchb.rb
          git commit -m "feat: bump cchb to v${VERSION}"
          git push
